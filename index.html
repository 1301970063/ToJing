<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 鸡蛋黄，生日快乐！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 气球动画 */
        .balloon {
            position: fixed;
            width: 60px;
            height: 80px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.8;
            animation: float 8s ease-in-out infinite;
            z-index: 1;
        }

        .balloon::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 20px;
            background: inherit;
            left: 50%;
            bottom: -15px;
            transform: translateX(-50%);
            border-radius: 0 0 5px 5px;
        }

        .balloon::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 25px;
            background: #666;
            left: 50%;
            bottom: -40px;
            transform: translateX(-50%);
        }

        .balloon-1 { background: #ff6b6b; animation-delay: 0s; left: 5%; }
        .balloon-2 { background: #ffd93d; animation-delay: 1s; left: 15%; }
        .balloon-3 { background: #6bcb77; animation-delay: 2s; left: 80%; }
        .balloon-4 { background: #4d96ff; animation-delay: 3s; left: 90%; }
        .balloon-5 { background: #ff9ff3; animation-delay: 4s; left: 25%; }
        .balloon-6 { background: #54a0ff; animation-delay: 5s; left: 70%; }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(-10deg); }
            50% { transform: translateY(-10vh) rotate(10deg); }
        }

        /* 星星背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 3rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out;
        }

        .subtitle {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.9);
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        /* 生日蛋糕 */
        .cake {
            text-align: center;
            font-size: 8rem;
            animation: bounce 2s ease-in-out infinite;
            margin: 30px 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 祝福卡片 */
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .message {
            font-size: 1.3rem;
            line-height: 2;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }

        .highlight {
            color: #ff6b6b;
            font-weight: bold;
        }

        /* 照片画廊 */
        .gallery-section {
            margin-top: 40px;
        }

        .gallery-title {
            text-align: center;
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            animation: fadeInUp 1s ease-out 0.9s both;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .gallery-item .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 107, 107, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: #fff;
            font-size: 1.5rem;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        /* 倒计时 */
        .countdown {
            text-align: center;
            margin-top: 40px;
            padding: 30px;
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease-out 1.2s both;
        }

        .countdown-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        .countdown-time {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .time-box {
            text-align: center;
        }

        .time-number {
            font-size: 3rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        .time-label {
            font-size: 1rem;
            color: #666;
        }

        /* 心形动画 */
        .hearts {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            color: #ff6b6b;
            font-size: 20px;
            opacity: 0;
            animation: heartFloat 4s ease-out infinite;
        }

        @keyframes heartFloat {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 1;
                transform: translateY(90vh) scale(1);
            }
            90% {
                opacity: 1;
                transform: translateY(-10vh) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-20vh) scale(0);
            }
        }

        /* 按钮 */
        .btn {
            display: block;
            width: 200px;
            margin: 30px auto;
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff6b6b, #ff9a9e);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.5);
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .title {
                font-size: 2rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
            .cake {
                font-size: 5rem;
            }
            .message {
                font-size: 1.1rem;
            }
            .countdown-time {
                gap: 15px;
            }
            .time-number {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 气球 -->
    <div class="balloon balloon-1"></div>
    <div class="balloon balloon-2"></div>
    <div class="balloon balloon-3"></div>
    <div class="balloon balloon-4"></div>
    <div class="balloon balloon-5"></div>
    <div class="balloon balloon-6"></div>

    <!-- 星星 -->
    <div class="stars" id="stars"></div>

    <!-- 心形 -->
    <div class="hearts" id="hearts"></div>

    <div class="container">
        <div class="header">
            <h1 class="title">🎂 生日快乐，我的宝贝！</h1>
            <p class="subtitle">今天是属于你的特别日子 💖</p>
        </div>

        <div class="cake">🎂</div>

        <div class="card">
            <p class="message">
                亲爱的 <span class="highlight">宝贝</span>，
                <br><br>
                在这个特别的日子里，我想告诉你：
                <br><br>
                遇见你是我生命中最美好的事情，
                <br>
                你的笑容像阳光一样温暖我的每一天，
                <br>
                你的温柔像春风一样抚慰我的心灵。
                <br><br>
                愿新的一岁里，
                <br>
                所有的美好都围绕着你，
                <br>
                所有的梦想都能实现，
                <br>
                而我会永远陪在你身边，
                <br>
                爱你，直到永远！
                <br><br>
                <span class="highlight">—— 永远爱你的我</span>
            </p>
        </div>

        <!-- 照片画廊 -->
        <div class="gallery-section">
            <h2 class="gallery-title">📷 我们的美好回忆</h2>
            <div class="gallery" id="gallery">
                <!-- 照片会动态加载 -->
            </div>
        </div>

        <!-- 倒计时 -->
        <div class="countdown">
            <h3 class="countdown-title">🎁 距离下次生日还有</h3>
            <div class="countdown-time">
                <div class="time-box">
                    <div class="time-number" id="days">0</div>
                    <div class="time-label">天</div>
                </div>
                <div class="time-box">
                    <div class="time-number" id="hours">0</div>
                    <div class="time-label">时</div>
                </div>
                <div class="time-box">
                    <div class="time-number" id="minutes">0</div>
                    <div class="time-label">分</div>
                </div>
                <div class="time-box">
                    <div class="time-number" id="seconds">0</div>
                    <div class="time-label">秒</div>
                </div>
            </div>
        </div>

        <button class="btn" onclick="showHearts()">点击我送你小心心 💗</button>
    </div>

    <script>
        // 生成星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 生成心形
        function createHearts() {
            const heartsContainer = document.getElementById('hearts');
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = '💗';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 4 + 's';
                heart.style.fontSize = (15 + Math.random() * 20) + 'px';
                heartsContainer.appendChild(heart);
            }
        }

        // 加载照片（使用内联SVG作为离线占位图）
        function loadPhotos() {
            const gallery = document.getElementById('gallery');
            const photos = [
                { title: '海边漫步', color: '#FF6B6B' },
                { title: '生日烛光', color: '#FFD93D' },
                { title: '星空下的我们', color: '#6BCB77' },
                { title: '阳光微笑', color: '#4D96FF' },
                { title: '浪漫野餐', color: '#FF9FF3' },
                { title: '拥抱幸福', color: '#54A0FF' }
            ];

            photos.forEach((photo, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.style.animationDelay = (1.5 + index * 0.1) + 's';
                
                // 使用内联SVG作为图片，完全离线可用
                const svgImage = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="200" viewBox="0 0 300 200">
                        <defs>
                            <linearGradient id="grad${index}" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:${photo.color};stop-opacity:0.3" />
                                <stop offset="100%" style="stop-color:${photo.color};stop-opacity:0.1" />
                            </linearGradient>
                        </defs>
                        <rect width="100%" height="100%" fill="url(#grad${index})" />
                        <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="${photo.color}" font-size="24" font-family="sans-serif">
                            ${photo.title}
                        </text>
                        <text x="50%" y="70%" text-anchor="middle" dominant-baseline="middle" fill="#666" font-size="12" font-family="sans-serif">
                            点击添加照片
                        </text>
                    </svg>
                `;
                
                item.innerHTML = `
                    <div style="width:100%;height:200px;">${svgImage}</div>
                    <div class="overlay">💖</div>
                `;
                
                // 点击可上传图片
                item.addEventListener('click', () => {
                    uploadPhoto(item, index);
                });
                
                gallery.appendChild(item);
            });
        }

        // 上传照片功能
        function uploadPhoto(element, index) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        element.innerHTML = `
                            <img src="${event.target.result}" alt="照片 ${index + 1}">
                            <div class="overlay">💖</div>
                        `;
                        // 保存到本地存储
                        localStorage.setItem(`birthday_photo_${index}`, event.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        // 加载保存的照片
        function loadSavedPhotos() {
            const galleryItems = document.querySelectorAll('.gallery-item');
            galleryItems.forEach((item, index) => {
                const savedPhoto = localStorage.getItem(`birthday_photo_${index}`);
                if (savedPhoto) {
                    item.innerHTML = `
                        <img src="${savedPhoto}" alt="照片 ${index + 1}">
                        <div class="overlay">💖</div>
                    `;
                }
            });
        }

        // 倒计时
        function countdown() {
            const nextBirthday = new Date();
            nextBirthday.setMonth(nextBirthday.getMonth() + 12);
            nextBirthday.setHours(0, 0, 0, 0);

            const updateCountdown = () => {
                const now = new Date();
                const diff = nextBirthday - now;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = days;
                document.getElementById('hours').textContent = hours;
                document.getElementById('minutes').textContent = minutes;
                document.getElementById('seconds').textContent = seconds;
            };

            updateCountdown();
            setInterval(updateCountdown, 1000);
        }

        // 点击送心形
        function showHearts() {
            for (let i = 0; i < 10; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = '💗';
                heart.style.left = (20 + Math.random() * 60) + '%';
                heart.style.animation = 'heartFloat 2s ease-out forwards';
                heart.style.animationDelay = Math.random() * 0.5 + 's';
                heart.style.fontSize = (20 + Math.random() * 20) + 'px';
                document.getElementById('hearts').appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 2000);
            }
        }

        // 初始化
        window.addEventListener('load', () => {
            createStars();
            createHearts();
            loadPhotos();
            loadSavedPhotos();
            countdown();
        });
    </script>
</body>
</html>
