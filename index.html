<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>我的名片 | 张三</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 30px 25px 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(2px);
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: scale(1.02);
        }
        .avatar {
            width: 120px;
            height: 120px;
            background: #764ba2;
            border-radius: 60px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }
        .title {
            font-size: 18px;
            color: #764ba2;
            font-weight: 500;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            display: inline-block;
            padding-bottom: 5px;
        }
        .contact {
            background: #f8f9ff;
            border-radius: 30px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 16px;
            color: #444;
            word-break: break-all;
        }
        .contact-item:last-child {
            margin-bottom: 0;
        }
        .emoji {
            font-size: 22px;
            min-width: 36px;
            text-align: center;
        }
        .btn {
            display: inline-block;
            background: #764ba2;
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn:active {
            background: #5a3a7a;
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">
            📱
        </div>
        <h1>张三</h1>
        <div class="title">全栈开发工程师</div>
        <div class="contact">
            <div class="contact-item">
                <span class="emoji">📧</span>
                <span>zhang.san@example.com</span>
            </div>
            <div class="contact-item">
                <span class="emoji">📞</span>
                <span>+86 138 1234 5678</span>
            </div>
            <div class="contact-item">
                <span class="emoji">🌐</span>
                <span>github.com/zhangsan</span>
            </div>
            <div class="contact-item">
                <span class="emoji">📍</span>
                <span>中国 · 上海市</span>
            </div>
        </div>
        <a href="#" class="btn" id="contactBtn">📩 联系我</a>
        <footer>在线名片 · 随时更新</footer>
    </div>
    <script>
        // 简单的交互示例
        document.getElementById('contactBtn').addEventListener('click', function(e) {
            e.preventDefault();
            alert('你可以替换成真实的邮箱或微信链接');
        });
    </script>
</body>
</html>
