<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 生日快乐 - Happy Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b9d;
            --secondary: #c44569;
            --accent: #ffd93d;
            --dark: #2d3436;
            --light: #fff5f8;
        }

        body {
            font-family: 'Noto Serif SC', 'Playfair Display', Georgia, serif;
            overflow-x: hidden;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #fecfef, #ffecd2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Canvas for particles */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Floating decorations */
        .floating-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            opacity: 0.6;
            animation: floatAround 20s linear infinite;
        }

        @keyframes floatAround {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .birthday-cake {
            font-size: 150px;
            display: block;
            animation: cakeBounce 3s ease-in-out infinite;
            margin-bottom: 30px;
            filter: drop-shadow(0 20px 40px rgba(255, 107, 157, 0.3));
        }

        @keyframes cakeBounce {
            0%, 100% {
                transform: translateY(0) scale(1) rotate(-2deg);
            }
            25% {
                transform: translateY(-20px) scale(1.05) rotate(2deg);
            }
            50% {
                transform: translateY(-10px) scale(1.02) rotate(-1deg);
            }
            75% {
                transform: translateY(-15px) scale(1.03) rotate(1deg);
            }
        }

        .main-title {
            font-size: 4.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b9d, #c44569, #ff6b9d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: gradientText 4s ease infinite, titleGlow 2s ease-in-out infinite alternate;
            letter-spacing: 5px;
        }

        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes titleGlow {
            from {
                filter: drop-shadow(0 0 20px rgba(255, 107, 157, 0.3));
            }
            to {
                filter: drop-shadow(0 0 40px rgba(255, 107, 157, 0.6));
            }
        }

        .subtitle {
            font-size: 1.8rem;
            color: #c44569;
            font-weight: 600;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        /* Message Card */
        .message-card {
            /* 背景图片设置 - 将下面的 URL 替换为你的 GitHub 图片地址 */
            background-image: url('https://raw.githubusercontent.com/1301970063/ToJing/refs/heads/main/back.jpeg'); /* 在这里填入图片URL */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* 如果没有设置背景图片，使用默认渐变背景 */
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 60px;
            margin: 50px auto;
            max-width: 900px;
            box-shadow: 
                0 30px 80px rgba(196, 69, 105, 0.2),
                0 0 0 1px rgba(255, 107, 157, 0.2) inset,
                inset 0 -2px 20px rgba(255, 107, 157, 0.05);
            animation: fadeInUp 1s ease-out 0.5s both;
            position: relative;
            overflow: hidden;
        }

        /* 背景图片遮罩层 - 让文字更清晰可读 */
        .message-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.85) 100%, 
                rgba(255, 245, 248, 0.9) 100%,
                rgba(255, 255, 255, 0.85) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .message-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff6b9d, #ffd93d, #ff6b9d);
            background-size: 200% 200%;
            animation: gradientText 4s ease infinite;
            z-index: 3;
        }

        .message-content {
            position: relative;
            z-index: 2;
            font-size: 1.3rem;
            line-height: 2.5;
            color: #2d3436;
            text-align: center;
        }

        .message-content p {
            margin-bottom: 25px;
        }

        .highlight-name {
            font-size: 1.8rem;
            color: #c44569;
            font-weight: 700;
        }

        .signature {
            margin-top: 40px;
            font-style: italic;
            color: #ff6b9d;
            font-size: 1.2rem;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: #c44569;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
            padding: 16px 45px;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(196, 69, 105, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
            font-weight: 600;
        }

        .refresh-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 50px rgba(196, 69, 105, 0.5);
        }

        @keyframes heartPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 蛋糕部分 */
        .cake-section {
            margin: 80px 0;
        }
        
        .cake-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 400px;
            margin: 0 auto;
        }
        
        .cake-layer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .cake-layer-bottom {
            bottom: 20px;
            width: 350px;
            height: 100px;
            background: linear-gradient(to bottom, #ff9a9e, #fecfef, #ffecd2);
            border: 3px solid #c44569;
        }
        
        .cake-layer-middle {
            bottom: 100px;
            width: 280px;
            height: 90px;
            background: linear-gradient(to bottom, #ffd93d, #ffecd2, #ff9a9e);
            border: 3px solid #c44569;
        }
        
        .cake-layer-top {
            bottom: 170px;
            width: 200px;
            height: 80px;
            background: linear-gradient(to bottom, #ff9a9e, #fecfef, #ffd93d);
            border: 3px solid #c44569;
        }
        
        .candles-container {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 10;
        }
        
        .candle {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .candle:hover {
            transform: scale(1.1);
        }
        
        .candle-body {
            width: 12px;
            height: 50px;
            background: linear-gradient(to right, #ff9a9e, #ff6b9d, #c44569);
            border-radius: 2px 2px 5px 5px;
            margin: 0 auto;
            box-shadow: 0 0 10px rgba(255,107,157,0.5);
        }
        
        .candle-flame {
            width: 20px;
            height: 30px;
            background: radial-gradient(circle at 50% 70%, #fff 0%, #ffd93d 30%, #ff9a9e 70%, transparent 100%);
            border-radius: 50% 50% 50% 50%;
            margin: 0 auto -10px;
            opacity: 0;
            animation: flameFlicker 0.3s ease-in-out infinite alternate;
            transition: opacity 0.5s ease;
        }
        
        .candle.flame-on .candle-flame {
            opacity: 1;
        }
        
        @keyframes flameFlicker {
            0% {
                transform: scale(1) rotate(-2deg);
            }
            100% {
                transform: scale(1.1) rotate(2deg);
            }
        }
        
        .cake-decoration {
            position: absolute;
            font-size: 2.5rem;
            animation: decorationFloat 3s ease-in-out infinite;
        }
        
        .deco-1 {
            top: 150px;
            left: 100px;
            animation-delay: 0s;
        }
        
        .deco-2 {
            top: 130px;
            right: 100px;
            animation-delay: 0.5s;
        }
        
        .deco-3 {
            top: 200px;
            left: 150px;
            animation-delay: 1s;
        }
        
        .deco-4 {
            top: 220px;
            right: 150px;
            animation-delay: 1.5s;
        }
        
        @keyframes decorationFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .cake-controls {
            text-align: center;
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .cake-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            color: #c44569;
        }

        /* Countdown Section */
        .countdown-section {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 245, 248, 0.95));
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 50px;
            margin: 60px auto;
            max-width: 800px;
            box-shadow: 
                0 30px 80px rgba(196, 69, 105, 0.2),
                0 0 0 1px rgba(255, 107, 157, 0.2) inset;
            animation: fadeInUp 1s ease-out 1.1s both;
        }

        .countdown-title {
            text-align: center;
            font-size: 2rem;
            color: #c44569;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .time-unit {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            padding: 30px 35px;
            border-radius: 25px;
            min-width: 130px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(196, 69, 105, 0.4);
            transition: all 0.3s ease;
        }

        .time-unit:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(196, 69, 105, 0.5);
        }

        .time-number {
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            font-family: 'Playfair Display', serif;
        }

        .time-label {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.1rem;
            margin-top: 8px;
        }

        /* Interactive Button */
        .magic-btn {
            display: block;
            width: 320px;
            margin: 60px auto;
            padding: 22px 50px;
            background: linear-gradient(135deg, #ffd93d, #ff6b9d);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(255, 107, 157, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
            font-weight: 700;
            animation: fadeInUp 1s ease-out 1.4s both, btnGlow 2s ease-in-out infinite alternate;
            position: relative;
            overflow: hidden;
        }

        .magic-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transform: rotate(45deg);
            animation: btnShine 3s ease-in-out infinite;
        }

        @keyframes btnShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        @keyframes btnGlow {
            from { box-shadow: 0 20px 50px rgba(255, 107, 157, 0.4); }
            to { box-shadow: 0 25px 60px rgba(255, 217, 61, 0.5); }
        }

        .magic-btn:hover {
            transform: translateY(-8px) scale(1.05);
        }

        /* Floating Hearts */
        .floating-heart {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            animation: floatHeartUp 2.5s ease-out forwards;
        }

        @keyframes floatHeartUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-300px) scale(1.8) rotate(720deg);
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px;
            color: #c44569;
            font-size: 1.1rem;
            animation: fadeInUp 1s ease-out 1.6s both;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-title { font-size: 2.5rem; }
            .subtitle { font-size: 1.3rem; }
            .birthday-cake { font-size: 100px; }
            .message-card { padding: 40px 25px; }
            .message-content { font-size: 1.1rem; }
            .gallery { grid-template-columns: 1fr; }
            .time-unit { min-width: 100px; padding: 20px; }
            .time-number { font-size: 2.5rem; }
            .magic-btn { width: 260px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    
    <div class="floating-decorations" id="floatingDecorations"></div>

    <div class="container">
        <div class="hero">
            <span class="birthday-cake">🎂</span>
            <h1 class="main-title">生日快乐</h1>
            <p class="subtitle">Happy Birthday, My Love ✨</p>
        </div>

        <div class="message-card">
            <div class="message-content">
                <p>亲爱的 <span class="highlight-name">宝贝</span>，</p>
                <p>在这个属于你的特别日子里，</p>
                <p>我想对你说，遇见你是我这辈子最幸运的事。</p>
                <p>你的笑容像阳光一样温暖，</p>
                <p>你的温柔像春风一样醉人。</p>
                <p>愿新的一岁里，</p>
                <p>所有的美好都如期而至，</p>
                <p>所有的梦想都能实现，</p>
                <p>而我会一直陪在你身边，</p>
                <p>爱你，永远 💖</p>
                <p class="signature">—— 永远爱你的我</p>
            </div>
        </div>

        <!-- 生日蛋糕蜡烛互动 -->
        <div class="cake-section" style="animation: fadeInUp 1s ease-out 0.8s both;">
            <h2 class="section-title">🎂 点亮生日蜡烛</h2>
            <div class="cake-container" id="cake-container">
                <!-- 蛋糕底层 -->
                <div class="cake-layer cake-layer-bottom"></div>
                <!-- 蛋糕中层 -->
                <div class="cake-layer cake-layer-middle"></div>
                <!-- 蛋糕顶层 -->
                <div class="cake-layer cake-layer-top"></div>
                
                <!-- 蜡烛容器 -->
                <div class="candles-container" id="candles-container"></div>
                
                <!-- 蛋糕装饰 -->
                <div class="cake-decoration deco-1">🍓</div>
                <div class="cake-decoration deco-2">🍫</div>
                <div class="cake-decoration deco-3">🍰</div>
                <div class="cake-decoration deco-4">🍬</div>
            </div>
            
            <div class="cake-controls">
                <button class="refresh-btn" onclick="lightAllCandles()">🔥 全部点亮</button>
                <button class="refresh-btn" onclick="blowAllCandles()">💨 吹灭蜡烛</button>
            </div>
            <p class="cake-hint" id="cake-hint">点击蜡烛来点亮/吹灭它们！</p>
        </div>

        <div class="countdown-section">
            <h3 class="countdown-title">🎁 距离下次生日（农历四月初八）还有</h3>
            <p style="text-align: center; color: #c44569; margin-bottom: 20px; font-size: 1.1rem;" id="birthday-date"></p>
            <div class="countdown-timer">
                <div class="time-unit">
                    <div class="time-number" id="days">0</div>
                    <div class="time-label">天</div>
                </div>
                <div class="time-unit">
                    <div class="time-number" id="hours">0</div>
                    <div class="time-label">小时</div>
                </div>
                <div class="time-unit">
                    <div class="time-number" id="minutes">0</div>
                    <div class="time-label">分钟</div>
                </div>
                <div class="time-unit">
                    <div class="time-number" id="seconds">0</div>
                    <div class="time-label">秒</div>
                </div>
            </div>
        </div>

        <button class="magic-btn" onclick="burstHearts()">
            💗 点击送你小心心
        </button>

        <div class="footer">
            💕 愿你每一天都被温柔以待 💕
        </div>
    </div>

        // 农历月份
        const lunarMonths = ["正", "二", "三", "四", "五", "六", "七", "八", "九", "十", "冬", "腊"];
        
        // 农历日期
        const lunarDays = ["初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十",
            "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十",
            "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"];

        // 返回农历 y年的总天数
        function lYearDays(y) {
            let i, sum = 348;
            for (i = 0x8000; i > 0x8; i >>= 1) {
                sum += (lunarInfo[y - 1900] & i) ? 1 : 0;
            }
            return (sum + leapDays(y));
        }

        // 返回农历 y年闰月的天数
        function leapDays(y) {
            if (leapMonth(y)) {
                return ((lunarInfo[y - 1900] & 0x10000) ? 30 : 29);
            } else {
                return (0);
            }
        }

        // 返回农历 y年闰哪个月 1-12 , 没闰返回 0
        function leapMonth(y) {
            return (lunarInfo[y - 1900] & 0xf);
        }

        // 返回农历 y年m月的总天数
        function monthDays(y, m) {
            return ((lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29);
        }

        // 传入农历年月日，计算对应的公历日期
        function LunarToSolar(lunarYear, lunarMonth, lunarDay, isLeap) {
            let baseDate = new Date(1900, 0, 31);
            let offset = 0;
            let temp;
            
            // 计算农历年份的总天数
            for (temp = 1900; temp < lunarYear; temp++) {
                offset += lYearDays(temp);
            }
            
            // 计算农历月份的总天数
            let leap = leapMonth(lunarYear);
            for (temp = 1; temp < lunarMonth; temp++) {
                offset += monthDays(lunarYear, temp);
            }
            
            // 如果是闰月且当前月份小于闰月，或者指定为闰月
            if (isLeap && leap >= lunarMonth) {
                // 已经计算了闰月前的月份，需要加上闰月
                if (leap === lunarMonth) {
                    // 就是要找这个闰月
                } else if (leap < lunarMonth) {
                    offset += leapDays(lunarYear);
                }
            } else if (!isLeap && leap > 0 && leap < lunarMonth) {
                offset += leapDays(lunarYear);
            }
            
            // 如果指定是闰月
            if (isLeap && leap === lunarMonth) {
                // 已经处理了
            }
            
            // 加上日期
            offset += (lunarDay - 1);
            
            baseDate.setTime(baseDate.getTime() + offset * 24 * 60 * 60 * 1000);
            return baseDate;
        }

        // 获取下一个农历四月初八对应的公历日期
        function getNextBirthday() {
            const today = new Date();
            let year = today.getFullYear();
            
            // 尝试今年的农历四月初八
            let birthday = LunarToSolar(year, 4, 8, false);
            birthday.setHours(0, 0, 0, 0);
            
            // 如果今年的生日已经过了，就用明年的
            if (birthday < today) {
                birthday = LunarToSolar(year + 1, 4, 8, false);
            }
            
            return birthday;
        }
        
        // 初始化粒子背景
        function initParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);
            
            const particles = [];
            const colors = ['#ff6b9d', '#ffd93d', '#ff9a9e', '#fecfef'];
            
            class Particle {
                constructor() {
                    this.reset();
                }
                
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 6 + 2;
                    this.speedX = (Math.random() - 0.5) * 0.8;
                    this.speedY = (Math.random() - 0.5) * 0.8;
                    this.opacity = Math.random() * 0.5 + 0.2;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                }
                
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                        this.reset();
                    }
                }
                
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.opacity;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
        
        // 初始化浮动装饰
        function initFloatingDecorations() {
            const container = document.getElementById('floatingDecorations');
            const items = ['🎈', '🎁', '⭐', '✨', '💫', '🌟', '🎀', '🎉'];
            
            for (let i = 0; i < 20; i++) {
                const item = document.createElement('div');
                item.className = 'floating-item';
                item.textContent = items[Math.floor(Math.random() * items.length)];
                item.style.left = Math.random() * 100 + '%';
                item.style.animationDuration = (15 + Math.random() * 20) + 's';
                item.style.animationDelay = Math.random() * 20 + 's';
                item.style.fontSize = (20 + Math.random() * 30) + 'px';
                container.appendChild(item);
            }
        }
        
        // 初始化蜡烛
        function initCandles() {
            const container = document.getElementById('candles-container');
            const candleCount = 8; // 8根蜡烛
            
            for (let i = 0; i < candleCount; i++) {
                const candle = document.createElement('div');
                candle.className = 'candle';
                candle.innerHTML = `
                    <div class="candle-flame"></div>
                    <div class="candle-body"></div>
                `;
                
                candle.addEventListener('click', () => toggleCandle(candle));
                container.appendChild(candle);
            }
        }
        
        // 切换蜡烛状态
        function toggleCandle(candle) {
            candle.classList.toggle('flame-on');
            updateHint();
            
            // 添加一些特效
            if (candle.classList.contains('flame-on')) {
                createSparkles(candle);
            }
        }
        
        // 全部点亮
        function lightAllCandles() {
            const candles = document.querySelectorAll('.candle');
            candles.forEach((candle, index) => {
                setTimeout(() => {
                    candle.classList.add('flame-on');
                    createSparkles(candle);
                }, index * 150);
            });
            updateHint();
        }
        
        // 全部吹灭
        function blowAllCandles() {
            const candles = document.querySelectorAll('.candle');
            candles.forEach((candle, index) => {
                setTimeout(() => {
                    candle.classList.remove('flame-on');
                }, index * 100);
            });
            updateHint();
            
            // 吹灭后放烟花
            setTimeout(() => {
                createFireworks();
            }, candles.length * 100 + 300);
        }
        
        // 更新提示文字
        function updateHint() {
            const candles = document.querySelectorAll('.candle');
            const litCount = document.querySelectorAll('.candle.flame-on').length;
            const hint = document.getElementById('cake-hint');
            
            if (litCount === candles.length) {
                hint.textContent = '🎉 所有蜡烛都点亮了！许个愿吧！✨';
            } else if (litCount === 0) {
                hint.textContent = '💨 蜡烛都灭了，点击重新点亮吧！';
            } else {
                hint.textContent = `🔥 ${litCount}/${candles.length} 根蜡烛已点亮`;
            }
        }
        
        // 创建火花特效
        function createSparkles(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top;
            
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.textContent = '✨';
                sparkle.style.position = 'fixed';
                sparkle.style.left = centerX + 'px';
                sparkle.style.top = centerY + 'px';
                sparkle.style.fontSize = '1.5rem';
                sparkle.style.pointerEvents = 'none';
                sparkle.style.zIndex = '9999';
                document.body.appendChild(sparkle);
                
                const angle = (i / 8) * Math.PI * 2;
                const distance = 50 + Math.random() * 30;
                const duration = 600 + Math.random() * 400;
                
                sparkle.animate([
                    { 
                        transform: 'translate(-50%, -50%) scale(1)',
                        opacity: 1 
                    },
                    { 
                        transform: `translate(calc(-50% + ${Math.cos(angle) * distance}px), calc(-50% + ${Math.sin(angle) * distance}px)) scale(0)`,
                        opacity: 0 
                    }
                ], {
                    duration: duration,
                    easing: 'ease-out'
                }).onfinish = () => sparkle.remove();
            }
        }
        
        // 创建烟花特效
        function createFireworks() {
            const colors = ['🎆', '🎇', '✨', '💫', '⭐'];
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const firework = document.createElement('div');
                    firework.textContent = colors[Math.floor(Math.random() * colors.length)];
                    firework.style.position = 'fixed';
                    firework.style.left = (20 + Math.random() * 60) + '%';
                    firework.style.top = (20 + Math.random() * 40) + '%';
                    firework.style.fontSize = '4rem';
                    firework.style.pointerEvents = 'none';
                    firework.style.zIndex = '9999';
                    document.body.appendChild(firework);
                    
                    firework.animate([
                        { 
                            transform: 'scale(0.5)',
                            opacity: 1 
                        },
                        { 
                            transform: 'scale(2)',
                            opacity: 0 
                        }
                    ], {
                        duration: 1500,
                        easing: 'ease-out'
                    }).onfinish = () => firework.remove();
                }, i * 200);
            }
        }
        
        // 倒计时
        function initCountdown() {
            let nextBirthday = getNextBirthday();
            
            // 显示生日日期
            const year = nextBirthday.getFullYear();
            const month = nextBirthday.getMonth() + 1;
            const day = nextBirthday.getDate();
            document.getElementById('birthday-date').textContent = `（公历 ${year}年${month}月${day}日）`;
            
            function update() {
                const current = new Date();
                const diff = nextBirthday - current;
                
                if (diff <= 0) {
                    // 生日到了，更新为下一年的生日
                    nextBirthday = getNextBirthday();
                    const newYear = nextBirthday.getFullYear();
                    const newMonth = nextBirthday.getMonth() + 1;
                    const newDay = nextBirthday.getDate();
                    document.getElementById('birthday-date').textContent = `（公历 ${newYear}年${newMonth}月${newDay}日）`;
                }
                
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                document.getElementById('days').textContent = Math.max(0, days);
                document.getElementById('hours').textContent = Math.max(0, hours);
                document.getElementById('minutes').textContent = Math.max(0, minutes);
                document.getElementById('seconds').textContent = Math.max(0, seconds);
            }
            
            update();
            setInterval(update, 1000);
        }
        
        // 爱心爆发
        function burstHearts() {
            const hearts = ['💖', '💕', '💗', '💓', '💝', '❤️', '💘', '💞', '💟', '💌', '🥰', '😍'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'floating-heart';
                    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.left = (20 + Math.random() * 60) + '%';
                    heart.style.top = (50 + Math.random() * 20) + '%';
                    heart.style.fontSize = (25 + Math.random() * 35) + 'px';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 2500);
                }, i * 40);
            }
        }
        
        // 页面加载初始化
        window.addEventListener('load', () => {
            initParticles();
            initFloatingDecorations();
            initCandles();
            initCountdown();
        });
    </script>
</body>
